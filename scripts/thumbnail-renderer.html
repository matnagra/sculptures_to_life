<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thumbnail Renderer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1220;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import * as THREE from "https://esm.sh/three@0.151.3";
      import { GLTFLoader } from "https://esm.sh/three@0.151.3/examples/jsm/loaders/GLTFLoader.js";

      const WIDTH = 256;
      const HEIGHT = 256;
      const url = new URL(window.location.href);
      const model = url.searchParams.get("model");
      const bg = url.searchParams.get("bg") ?? "#0b1220";

      const reportError = (message) => {
        window.__thumbError = message;
        document.body.dataset.error = "1";
      };

      if (!model) {
        reportError("Missing model query parameter.");
        throw new Error("Missing model query parameter.");
      }

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(bg);

      const camera = new THREE.PerspectiveCamera(35, WIDTH / HEIGHT, 0.01, 1000);
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.setSize(WIDTH, HEIGHT);
      renderer.setPixelRatio(1);
      document.body.appendChild(renderer.domElement);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x202020, 0.95);
      const key = new THREE.DirectionalLight(0xffffff, 0.9);
      key.position.set(3, 4, 2);
      const fill = new THREE.DirectionalLight(0xffffff, 0.35);
      fill.position.set(-2, 2, -3);
      scene.add(hemi, key, fill);

      const loader = new GLTFLoader();
      loader.load(
        model,
        (gltf) => {
          const root = gltf.scene;
          scene.add(root);

          const box = new THREE.Box3().setFromObject(root);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          root.position.sub(center);
          const maxDim = Math.max(size.x, size.y, size.z, 0.001);
          const distance = maxDim * 1.9;
          camera.position.set(distance * 0.9, distance * 0.8, distance);
          camera.lookAt(0, 0, 0);
          camera.near = Math.max(0.01, distance / 100);
          camera.far = Math.max(100, distance * 10);
          camera.updateProjectionMatrix();

          renderer.render(scene, camera);
          requestAnimationFrame(() => {
            renderer.render(scene, camera);
            document.body.dataset.ready = "1";
          });
        },
        undefined,
        (error) => {
          reportError(error instanceof Error ? error.message : "Failed to load model.");
        },
      );
    </script>
  </body>
</html>
